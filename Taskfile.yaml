version: '3'

tasks:
  # Setup (code repo has app/ and cdk8s/ at root level)
  app:setup:
    desc: "Set up CascadeGuard app component"
    dir: app
    cmds:
      - cmd: echo "🔧 Setting up CascadeGuard app environment..."
        silent: true
      - cmd: |
          if [ -n "$CI" ]; then
            echo "CI environment detected, skipping virtual environment creation"
          else
            if [ ! -d ".venv" ]; then
              echo "Creating virtual environment..."
              python3 -m venv .venv
            fi
          fi
        silent: true
      - cmd: |
          echo "Installing dependencies..."
          if [ -n "$CI" ]; then
            pip install -e ".[dev]"
          else
            .venv/bin/pip install -e ".[dev]"
          fi
        silent: true

  cdk8s:setup:
    desc: "Set up CascadeGuard CDK8s component"
    dir: cdk8s
    cmds:
      - cmd: echo "🔧 Setting up CascadeGuard CDK8s environment..."
        silent: true
      - cmd: |
          if [ -n "$CI" ]; then
            echo "CI environment detected, skipping virtual environment creation"
          else
            if [ ! -d ".venv" ]; then
              echo "Creating virtual environment..."
              
              echo "Finding compatible Python version (>=3.10, <3.15)"
              python_cmd=""
              for py in python3.11 python3.12 python3.13 python3.10 python3; do
                if command -v "$py" >/dev/null 2>&1; then
                  if $py -c "import sys; exit(0 if (3, 10) <= sys.version_info[:2] < (3, 15) else 1)" 2>/dev/null; then
                    python_version=$($py -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
                    echo "Found compatible Python $python_version ($py)"
                    python_cmd="$py"
                    break
                  fi
                fi
              done
              
              if [ -z "$python_cmd" ]; then
                echo "Error: No compatible Python version found"
                echo "Required: Python >=3.10, <3.15 (GitHub Actions uses 3.11)"
                echo "Available Python versions:"
                for py in python3.11 python3.12 python3.13 python3.10 python3; do
                  if command -v "$py" >/dev/null 2>&1; then
                    version=$($py -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')" 2>/dev/null || echo "unknown")
                    echo "  $py: Python $version"
                  fi
                done
                exit 1
              fi
              
              $python_cmd -m venv .venv
            fi
          fi
        silent: true
      - cmd: |
          echo "Installing dependencies..."
          if [ -n "$CI" ]; then
            pip install -e ".[dev]"
          else
            .venv/bin/pip install -e ".[dev]"
          fi
        silent: true

  hooks:install:
    desc: "Install git hooks"
    cmds:
      - cmd: |
          if [ -n "$CI" ]; then
            echo "CI environment detected, skipping git hook installation"
          else
            echo "Installing pre-commit hook..."
            cp hooks/pre-commit .git/hooks/pre-commit
            chmod +x .git/hooks/pre-commit
            echo "✅ Pre-commit hook installed"
          fi
        silent: true

  setup:
    desc: "Set up CascadeGuard development environment"
    cmds:
      - task: app:setup
      - task: cdk8s:setup
      - task: hooks:install

  # Test setup and execution (code-only, no state required)
  test:unit:setup:
    desc: "Set up CascadeGuard development environment"
    cmds:
      - task: setup

  test:unit:
    desc: "Run unit tests for CascadeGuard"
    cmds:
      - task: app:test:unit
      - task: cdk8s:test:unit

  test:integration:setup:
    desc: "Set up integration test"
    dir: tests/integration
    cmds:
      - cmd: echo "🔧 Setting up integration test environment..."
        silent: true
      - cmd: |
          if [ -n "$CI" ]; then
            echo "CI environment detected, skipping virtual environment creation"
          else
            if [ ! -d ".venv" ]; then
              echo "Creating virtual environment..."
              python3 -m venv .venv
            fi
          fi
        silent: true
      - cmd: |
          echo "Installing dependencies..."
          if [ -n "$CI" ]; then
            pip install -e ".[dev]"
          else
            .venv/bin/pip install -e ".[dev]"
          fi
        silent: true

  test:integration:
    desc: "Run integration tests for CascadeGuard"
    dir: tests/integration
    cmds:
      - cmd: |
          if [ -n "$CI" ]; then
            python -m pytest test_integration.py -v
          else
            .venv/bin/python -m pytest test_integration.py -v
          fi
      
  test:acceptance:setup:
    desc: "Set up acceptance test environment"
    cmds:
      - task: setup
      - cmd: |
          echo "Installing acceptance test dependencies..."
          if [ -n "$CI" ]; then
            pip install -e "tests/acceptance/.[dev]"
          else
            echo "Using existing virtual environments"
          fi
        silent: true

  test:acceptance:
    desc: "Run acceptance tests for CascadeGuard (CLI + CDK8s synth)"
    dir: .
    cmds:
      - cmd: echo "🧪 Running CascadeGuard acceptance tests..."
        silent: true
      - cmd: |
          if [ -n "$CI" ]; then
            python -m pytest tests/acceptance/test_acceptance.py -v
          else
            app/.venv/bin/python -m pytest tests/acceptance/test_acceptance.py -v
          fi

  test:acceptance:kargo:
    desc: "Run Kargo live acceptance tests (requires K8s cluster)"
    dir: .
    cmds:
      - cmd: echo "🧪 Running Kargo acceptance tests..."
        silent: true
      - npm install
      - npm run test:kargo

  test:all:
    desc: "Run all tests for CascadeGuard"
    deps: [test:unit, test:integration, test:acceptance]

  # Component unit tests (code-only)
  app:test:unit:
    desc: "Run unit tests for CascadeGuard app component"
    dir: app
    cmds:
      - cmd: echo "🧪 Running CascadeGuard app unit tests..."
        silent: true
      - cmd: |
          if [ -n "$CI" ]; then
            python -m pytest tests/test_app.py tests/test_cascadeguard.py tests/test_hooks.py tests/test_scan.py tests/test_scan_issues_api.py tests/test_actions_policy.py tests/test_tools_check.py tests/test_tools_enroll.py tests/test_promotion_pr_api.py -v
          else
            .venv/bin/python -m pytest tests/test_app.py tests/test_cascadeguard.py tests/test_hooks.py tests/test_scan.py tests/test_scan_issues_api.py tests/test_actions_policy.py tests/test_tools_check.py tests/test_tools_enroll.py -v
          fi

  cdk8s:test:unit:
    desc: "Run unit tests for CascadeGuard CDK8s component"
    dir: cdk8s
    cmds:
      - cmd: echo "🧪 Running CascadeGuard CDK8s unit tests..."
        silent: true
      - cmd: |
          if [ -n "$CI" ]; then
            python -m pytest test_main.py -v
          else
            .venv/bin/python -m pytest test_main.py -v
          fi
