name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match pyproject.toml)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Generate PyPI README
        working-directory: app
        run: |
          python3 -c "
          from pathlib import Path
          text = Path('../README.md').read_text()
          marker = '\n## Repository Structure'
          idx = text.find(marker)
          out = text[:idx].rstrip() if idx != -1 else text
          Path('README.md').write_text(out + '\n')
          "

      - name: Verify version matches
        working-directory: app
        run: |
          TOML_VERSION=$(python -c "
          import re
          with open('pyproject.toml') as f:
              match = re.search(r'version\s*=\s*\"(.+?)\"', f.read())
              print(match.group(1))
          ")
          if [ "$TOML_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::Version mismatch: pyproject.toml has $TOML_VERSION but workflow input is ${{ inputs.version }}"
            exit 1
          fi
          echo "Version verified: $TOML_VERSION"

      - name: Build package
        working-directory: app
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: app/dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b54f72e44af3222f3f2f751c # v1.12.4
        with:
          packages-dir: dist/
