name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version increment type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Compute next version
        id: bump
        run: |
          CURRENT=$(cat VERSION)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          BUMP="${{ inputs.bump }}"
          case "$BUMP" in
            major) NEXT="$((MAJOR + 1)).0.0" ;;
            minor) NEXT="$MAJOR.$((MINOR + 1)).0" ;;
            *)     NEXT="$MAJOR.$MINOR.$((PATCH + 1))" ;;
          esac
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEXT ($BUMP)"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Generate PyPI README
        working-directory: app
        run: |
          python3 -c "
          from pathlib import Path
          text = Path('../README.md').read_text()
          marker = '\n## Repository Structure'
          idx = text.find(marker)
          out = text[:idx].rstrip() if idx != -1 else text
          Path('README.md').write_text(out + '\n')
          "

      - name: Set version in pyproject.toml
        working-directory: app
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          python3 -c "
          import re, pathlib
          p = pathlib.Path('pyproject.toml')
          content = p.read_text()
          content = re.sub(r'^version\s*=\s*\"[^\"]+\"', 'version = \"$VERSION\"', content, flags=re.MULTILINE)
          p.write_text(content)
          "
          echo "Set pyproject.toml version to $VERSION"

      - name: Build package
        working-directory: app
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: app/dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" dist/* \
            --title "v$VERSION" \
            --generate-notes

  commit-version:
    name: Commit version bump
    runs-on: ubuntu-latest
    needs: [build, release]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Write version files and push
        run: |
          VERSION="${{ needs.build.outputs.version }}"

          echo "$VERSION" > VERSION
          python3 -c "
          import re, pathlib
          p = pathlib.Path('app/pyproject.toml')
          content = p.read_text()
          content = re.sub(r'^version\s*=\s*\"[^\"]+\"', 'version = \"$VERSION\"', content, flags=re.MULTILINE)
          p.write_text(content)
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION app/pyproject.toml
          git commit -m "chore: bump version to $VERSION after publish"
          git push
