name: Publish to PyPI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Generate PyPI README
        working-directory: app
        run: |
          python3 -c "
          from pathlib import Path
          text = Path('../README.md').read_text()
          marker = '\n## Repository Structure'
          idx = text.find(marker)
          out = text[:idx].rstrip() if idx != -1 else text
          Path('README.md').write_text(out + '\n')
          "

      - name: Verify version matches pyproject.toml
        working-directory: app
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TOML_VERSION=$(python -c "
          import re
          with open('pyproject.toml') as f:
              match = re.search(r'version\s*=\s*\"(.+?)\"', f.read())
              print(match.group(1))
          ")
          if [ "$TOML_VERSION" != "$VERSION" ]; then
            echo "::error::Version mismatch: pyproject.toml has $TOML_VERSION but VERSION file has $VERSION"
            exit 1
          fi
          echo "Version verified: $VERSION"

      - name: Build package
        working-directory: app
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: app/dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
        with:
          packages-dir: dist/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" dist/* \
            --title "v$VERSION" \
            --generate-notes

  bump-version:
    name: Bump version after publish
    runs-on: ubuntu-latest
    needs: [build, release]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Bump patch version
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          echo "$NEXT_VERSION" > VERSION
          sed -i "s/^version = \"$VERSION\"/version = \"$NEXT_VERSION\"/" app/pyproject.toml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION app/pyproject.toml
          git commit -m "chore: bump version to $NEXT_VERSION after $VERSION publish"
          git push
